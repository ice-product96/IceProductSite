<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Айс.Продукт</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .form-input { width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:0.875rem;outline:none;transition:border-color 0.15s; }
    .form-input:focus { border-color:#639922; }
  </style>
</head>
<body class="min-h-screen bg-[#EAF3DE] flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-2xl border border-[#EAF3DE] p-8 flex flex-col gap-6">
    <div class="text-center">
      <div class="flex items-center justify-center gap-1 text-xl font-bold mb-2">
        <span class="text-[#639922]">Айс</span><span class="text-[#5F5E5A]">.</span><span class="text-[#1a1a1a]">Продукт</span>
      </div>
      <p class="text-sm text-[#5F5E5A]">Панель управления</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/admin/login" class="flex flex-col gap-4">
      <input type="hidden" name="csrf_token" value="{{ csrf }}" />

      <div>
        <label class="block text-xs font-medium text-[#5F5E5A] mb-1.5">Логин</label>
        <input type="text" name="username" class="form-input" placeholder="admin" required autocomplete="username" />
      </div>
      <div>
        <label class="block text-xs font-medium text-[#5F5E5A] mb-1.5">Пароль</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="w-full bg-[#639922] hover:bg-[#517d1c] text-white font-medium py-2.5 rounded-xl transition-colors text-sm mt-2">
        Войти
      </button>
    </form>

    <a href="/" class="text-center text-xs text-[#5F5E5A] hover:text-[#639922] transition-colors">← На сайт</a>
  </div>
</body>
</html>
