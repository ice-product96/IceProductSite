{% extends "admin/base_admin.html" %}
{% block title %}Настройки{% endblock %}
{% block page_title %}Настройки компании{% endblock %}

{% block content %}
<div class="max-w-2xl">

  {% if saved %}
  <div class="mb-6 text-sm rounded-xl px-4 py-3 flex items-center gap-2 text-white"
       style="background: linear-gradient(to right, #26c6da, #66bb6a)">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    Настройки сохранены.
  </div>
  {% endif %}

  <form method="post" action="/admin/settings" class="admin-card flex flex-col gap-6">
    <input type="hidden" name="csrf_token" value="{{ csrf }}" />

    <div>
      <label class="form-label">Слоган <span class="text-[#5F5E5A]/50">(отображается на главной)</span></label>
      <input type="text" name="slogan" class="form-input" value="{{ settings.slogan or '' }}" maxlength="255" placeholder="Умные инструменты для современных команд" />
    </div>

    <div>
      <label class="form-label">Краткое описание компании</label>
      <textarea name="short_description" rows="4" class="form-input resize-none" placeholder="2–3 предложения о компании…">{{ settings.short_description or '' }}</textarea>
    </div>

    <hr class="border-[#EAF3DE]" />

    <div>
      <label class="form-label">Мета-заголовок <span class="text-[#5F5E5A]/50">(title страницы)</span></label>
      <input type="text" name="meta_title" class="form-input" value="{{ settings.meta_title or '' }}" maxlength="255" placeholder="Айс.Продукт — Умные инструменты" />
    </div>

    <div>
      <label class="form-label">Мета-описание <span class="text-[#5F5E5A]/50">(meta description)</span></label>
      <textarea name="meta_description" rows="2" class="form-input resize-none" maxlength="255" placeholder="До 160 символов…">{{ settings.meta_description or '' }}</textarea>
      <p class="text-xs text-[#5F5E5A] mt-1">До 255 символов.</p>
    </div>

    <div class="flex justify-end pt-2">
      <button type="submit" class="btn-accent">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Сохранить
      </button>
    </div>
  </form>
</div>
{% endblock %}
