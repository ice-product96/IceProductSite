<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ settings.meta_title or "Айс.Продукт" }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ settings.meta_description or '' }}{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ice: {
              white:   '#FFFFFF',
              light:   '#EAF3DE',
              accent:  '#639922',
              dark:    '#1a1a1a',
              muted:   '#5F5E5A',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'xl':  '12px',
            '2xl': '16px',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; color: #1a1a1a; background: #FFFFFF; }
    .btn-accent {
      display: inline-flex; align-items: center; gap: 6px;
      background: #639922; color: #fff; font-weight: 500;
      padding: 10px 22px; border-radius: 12px;
      transition: background 0.15s;
    }
    .btn-accent:hover { background: #517d1c; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1.5px solid #639922; color: #639922; font-weight: 500;
      padding: 9px 20px; border-radius: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #639922; color: #fff; }
    .card {
      background: #FFFFFF; border: 1.5px solid #EAF3DE;
      border-radius: 16px; overflow: hidden;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #639922; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col">

  <!-- NAV -->
  <header class="sticky top-0 z-30 bg-white border-b border-[#EAF3DE]">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2 font-semibold text-[#1a1a1a] text-lg tracking-tight">
        <span class="text-[#639922] font-bold">Айс</span><span class="text-[#5F5E5A]">.</span><span>Продукт</span>
      </a>
      <nav class="flex items-center gap-6 text-sm text-[#5F5E5A]">
        <a href="/#products" class="hover:text-[#639922] transition-colors">Продукты</a>
        {% if request.url.path.startswith('/admin') %}
          <a href="/admin/logout" class="hover:text-[#639922] transition-colors">Выйти</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="bg-[#EAF3DE] mt-auto">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-[#5F5E5A]">
      <span>© {{ settings.meta_title or "Айс.Продукт" }} {{ 2026 }}</span>
      <span>Умные инструменты для современных команд</span>
    </div>
  </footer>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
